baseline:
  tfidf:
    ngram_range: [1, 2]
    max_features: 50000
    min_df: 2

  logistic_regression:
    max_iter: 1000
    class_weight: "balanced"

experiments:
  - name: "herbert-base"
    model_name: "allegro/herbert-base-cased"
    max_length: 512
    batch_size: 8
    epochs: 3
    learning_rate: 2.0e-5

  - name: "polish-roberta-v2"
    model_name: "sdadas/polish-roberta-base-v2"
    max_length: 512
    batch_size: 8
    epochs: 3
    learning_rate: 2.0e-5

  - name: "xlm-roberta-base"
    model_name: "FacebookAI/xlm-roberta-base"
    max_length: 512
    batch_size: 8
    epochs: 3
    learning_rate: 2.0e-5

  - name: "distilbert-multilingual"
    model_name: "distilbert-base-multilingual-cased"
    max_length: 512
    batch_size: 8
    epochs: 3
    learning_rate: 2.0e-5
